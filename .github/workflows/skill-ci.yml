name: Skill CI

on:
  push:
    branches: [master]
    paths:
      - '**/skills/*/SKILL.md'
      - '**/skills/*/quiz.yaml'
  pull_request:
    paths:
      - '**/skills/*/SKILL.md'
      - '**/skills/*/quiz.yaml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find skill directories to test
        id: find-skills
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            DIRS=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD \
              | grep -E '.*/skills/.*/SKILL\.md|.*/skills/.*/quiz\.yaml' \
              | sed 's|/[^/]*$||' | sort -u)
          else
            DIRS=$(find . -path '*/skills/*/SKILL.md' | sed 's|/SKILL\.md$||' | sort -u)
          fi
          echo "dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIRS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check each changed skill has a quiz.yaml
        run: |
          MISSING=0
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            if [ ! -f "$dir/quiz.yaml" ]; then
              echo "ERROR: missing $dir/quiz.yaml"
              MISSING=1
            fi
          done <<< "${{ steps.find-skills.outputs.dirs }}"
          exit $MISSING

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install docmetrics
        run: pip install "git+https://github.com/mila-iqia/docmetrics.git@master"

      - name: Run docmetrics for each skill
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            SLUG=$(echo "$dir" | sed 's|^\./||; s|/|__|g')
            mkdir -p "/tmp/skill-results/$SLUG"
            echo "=== Evaluating: $dir ==="

            # Current branch: baseline + with current SKILL.md
            python -m docmetrics \
              --questions "$dir/quiz.yaml" \
              --docs-file "$dir/SKILL.md" \
              --model gemini-2.5-flash \
              --output-format json > "/tmp/skill-results/$SLUG/current.json"

            # Base branch: with old SKILL.md (only for modified skills on PRs)
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              BASE_REF="origin/${{ github.base_ref }}"
              if git show "$BASE_REF:$dir/SKILL.md" > /tmp/base-skill.md 2>/dev/null; then
                echo "  Base branch SKILL.md found, evaluating..."
                python -m docmetrics \
                  --questions "$dir/quiz.yaml" \
                  --docs-file /tmp/base-skill.md \
                  --model gemini-2.5-flash \
                  --output-format json > "/tmp/skill-results/$SLUG/base.json"
              fi
            fi
          done <<< "${{ steps.find-skills.outputs.dirs }}"

      - name: Format and post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/format_skill_comment.py \
            --results-dir /tmp/skill-results > /tmp/comment.md || true

          REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          EXISTING_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- skill-ci -->")) | .id' \
            | head -1)

          if [ -n "$EXISTING_ID" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$EXISTING_ID" \
              -f body="$(cat /tmp/comment.md)"
          else
            gh api --method POST "repos/$REPO/issues/$PR_NUMBER/comments" \
              -f body="$(cat /tmp/comment.md)"
          fi

      - name: Check results
        run: |
          python .github/scripts/format_skill_comment.py \
            --results-dir /tmp/skill-results > /dev/null
