    - "The command takes more than a few seconds to complete (e.g., installing a large Python package)"
    - "The command produces multi-line output that would clutter the conversation (e.g., `squeue --me`)"
    - "The command modifies files in the user's home directory (e.g., appending to `~/.bashrc`)"
