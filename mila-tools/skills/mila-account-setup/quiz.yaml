    - "Go to mfa.mila.quebec and log in with your @mila.quebec email address and your regular Mila account password, then enroll a TOTP device"
    - "Contact IT support at https://it-support.mila.quebec requesting them to enable MFA on your account; they will send a QR code to scan"
    - "Run `mila init` locally — it configures both SSH and MFA automatically in a single interactive setup step"
  answer: 0
  skills:
