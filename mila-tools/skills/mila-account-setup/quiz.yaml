- question: "Who should I reach out to if I have trouble connecting to the cluster with SSH?"
  options:
    A: "The IDT Team via Slack"
    B: "The IT Team via a formal support ticket (it-support@mila.quebec)"
    C: "DRAC technical support"
    D: "Your specific supervising professor"
    E: "Anthropic API support"
  answer: B
  skills:
    - mila-account-setup

- question: "How do I contact the IT team?"
  options:
    A: "By sending an email explicitly to it-support@mila.quebec to open a tracked support ticket"
    B: "By walking directly into room A.17 during scheduled office hours"
    C: "By posting your issue in the #pytorch slack channel"
    D: "By running the `mila init` command with the `--help` flag"
    E: "By contacting DRAC external support"
  answer: A
  skills:
    - mila-account-setup
