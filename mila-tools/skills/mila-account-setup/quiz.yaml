- question: "Which students have access to the Mila cluster?"
  options:
    A: "Current Students of Core Professors"
    B: "Students enrolled in the professional MsPro program"
    C: "All university students residing in Montreal"
    D: "Students supervised by any affiliated or non-core professor"
    E: "Undergraduate interns"
  answer: A
  skills:
    - mila-account-setup

- question: "How do I obtain my Mila account?"
  options:
    A: "By paying a monthly subscription fee via the official Mila website"
    B: "By successfully passing a rigorous technical interview with a core professor"
    C: "By directly contacting Mila systems administrators and successfully completing the required IT Onboarding Training quiz, provided you meet the strict affiliation requirements"
    D: "By creating an account entirely freely through GitHub SSO"
    E: "Accounts are automatically and dynamically generated for all university students residing in Canada"
  answer: C
  skills:
    - mila-account-setup

- question: "How do I get access to the Mila cluster?"
  options:
    A: "By emailing the CEO directly to request an account"
    B: "By completing the IT onboarding training and quiz, followed by MFA setup and waiting for administrator approval"
    C: "Access is automatically and instantly granted after connecting to the local WiFi network"
    D: "By purchasing a monthly allocation token directly from DRAC"
    E: "By logging into a compute node using guest credentials and creating a directory"
  answer: B
  skills:
    - mila-account-setup

- question: "How do I setup MFA to access the cluster?"
  options:
    A: "Install any TOTP-compatible authenticator app on your phone, open it, and scan the QR code shown on the Mila cluster dashboard — no web portal visit required"
    B: "Go to mfa.mila.quebec and log in with your @mila.quebec email address and your regular Mila account password, then enroll a TOTP device"
    C: "Go to mfa.mila.quebec, log in with your cluster username and the registration token from the email as the password, then immediately add at least one TOTP token using a compatible authenticator app (e.g., Authy, Google Authenticator)"
    D: "Email IT support at it-support@mila.quebec requesting them to enable MFA on your account; they will send a QR code to scan"
    E: "Run `mila init` locally — it configures both SSH and MFA automatically in a single interactive setup step"
  answer: C
  skills:
    - mila-account-setup

- question: "I have not received my MFA email. What should I do?"
  options:
    A: "Check your spam folder, then try logging into mfa.mila.quebec with your regular @mila.quebec account password to trigger a new token to be sent"
    B: "Ask your supervisor to resubmit the onboarding application — the registration email is only sent when the application is reprocessed"
    C: "Run `mila init` on your local machine; it will detect the missing MFA setup and trigger IT to send the registration email"
    D: "Verify that your cluster access has been confirmed by IT (email or Slack), check your spam folder, and if the email is still missing, contact IT support at it-support.mila.quebec to request a new registration token"
    E: "Wait at least two weeks before reaching out, since registration emails are batched and sent on a fixed weekly schedule"
  answer: D
  skills:
    - mila-account-setup

- question: >-
    "I can't seem to login to the 2FA thing, I use my username and the supplied
    password in the email but it won't let me logon. What could be the reason
    for this?"
  options:
    A: "The mfa.mila.quebec portal is temporarily offline for scheduled maintenance; it typically becomes available again within a few hours"
    B: "Your cluster account must be accessed via SSH at least once before the MFA portal will accept your credentials for the first time"
    C: "Cluster access can take up to 48 hours to propagate; the MFA portal will not accept logins until the account is fully active on all systems"
    D: "The registration token is tied to the specific browser and device from which you originally opened the email; you must use the same browser to log in to the portal"
    E: "The registration token from the email is single-use and is consumed on the very first login to mfa.mila.quebec. If you logged in previously without adding a TOTP token and then left, the token is now expired — contact IT support at it-support.mila.quebec to receive a new one"
  answer: E
  skills:
    - mila-account-setup
