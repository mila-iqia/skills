- question: "Which students have access to the Mila cluster?"
  options:
    A: "Current Students of Core Professors"
    B: "Students enrolled in the professional MsPro program"
    C: "All university students residing in Montreal"
    D: "Students supervised by any affiliated or non-core professor"
    E: "Undergraduate interns"
  answer: A

- question: "How do I get access to the Mila cluster?"
  options:
    A: "By emailing the CEO directly to request an account"
    B: "By completing the IT onboarding training and quiz, followed by MFA setup and waiting for administrator approval"
    C: "Access is automatically and instantly granted after connecting to the local WiFi network"
    D: "By purchasing a monthly allocation token directly from DRAC"
    E: "By logging into a compute node using guest credentials and creating a directory"
  answer: B

- question: "First Steps: How do I obtain my Mila account?"
  options:
    A: "By paying a monthly subscription fee via the official Mila website"
    B: "By successfully passing a rigorous technical interview with a core professor"
    C: "By directly contacting Mila systems administrators and successfully completing the required IT Onboarding Training quiz, provided you meet the strict affiliation requirements"
    D: "By creating an account entirely freely through GitHub SSO"
    E: "Accounts are automatically and dynamically generated for all university students residing in Canada"
  answer: C

- question: "How many different SSH keys can I use to connect to the Mila cluster?"
  options:
    A: "1"
    B: "2"
    C: "5"
    D: "Unlimited"
    E: "0, SSH connectivity is not supported on the infrastructure"
  answer: B

- question: "Can I add a new SSH key myself to connect to the Mila cluster?"
  options:
    A: "Yes, by securely SSHing in and directly editing your personal `~/.ssh/authorized_keys` file on the cluster filesystem"
    B: "Yes, by generating a key via `ssh-keygen` and ignoring the written policies"
    C: "No, you must formally ask IT-support via a ticket to add or rotate it for you"
    D: "Yes, but strictly only if you route the connection through a secondary proxy server"
    E: "A and B"
  answer: C

- question: "Who should I reach out to if I have trouble connecting to the cluster with SSH?"
  options:
    A: "The IDT Team via Slack"
    B: "The IT Team via a formal support ticket (it-support@mila.quebec)"
    C: "DRAC technical support"
    D: "Your specific supervising professor"
    E: "Anthropic API support"
  answer: B

- question: "How do I contact the IT team?"
  options:
    A: "By sending an email explicitly to it-support@mila.quebec to open a tracked support ticket"
    B: "By walking directly into room A.17 during scheduled office hours"
    C: "By posting your issue in the #pytorch slack channel"
    D: "By running the `mila init` command with the `--help` flag"
    E: "By contacting DRAC external support"
  answer: A

- question: "What is the difference between the IT and IDT teams at Mila?"
  options:
    A: "IT handles algorithmic design and model architecture; IDT handles the physical network cables"
    B: "There is no functional difference; they are exactly the same team under different names"
    C: "IT manages physical infrastructure, accounts, VPNs, and SSH access; IDT assists with ML workflows, PyTorch optimization, distributed training, and technical documentation"
    D: "IT only works on the remote DRAC clusters; IDT strictly only works on the internal Mila cluster"
    E: "IT manages the physical desk reservations; IDT manages the cafeteria operations"
